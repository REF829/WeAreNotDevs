<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WeAreDevs – Unofficial Loader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
      background:radial-gradient(circle at top,#020617 0,#020617 40%,#000 100%);
      color:#f9fafb;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 14px;
    }
    .card{
      position:relative;
      max-width:520px;
      width:100%;
      padding:26px 22px 24px;
      border-radius:24px;
      background:rgba(15,23,42,.96);
      box-shadow:0 0 50px rgba(37,99,235,.45);
      text-align:center;
      overflow:hidden;
    }
    .glow-ring{
      position:absolute;
      inset:-45%;
      background:conic-gradient(from 180deg,#22d3ee,#6366f1,#8b5cf6,#22d3ee);
      opacity:.18;
      filter:blur(30px);
      z-index:-1;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:3px 10px;
      border-radius:999px;
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      background:rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.6);
      color:#a5b4fc;
      margin-bottom:14px;
    }
    h1{
      font-size:32px;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .subtitle{
      font-size:12px;
      opacity:.7;
      margin-bottom:18px;
    }
    .desc{
      font-size:13px;
      opacity:.88;
      margin-bottom:22px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 26px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:14px;
      font-weight:600;
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      color:#f9fafb;
      box-shadow:0 0 30px rgba(37,99,235,.85);
      transition:transform .13s ease,box-shadow .13s ease,background .13s ease;
    }
    .btn:hover{
      transform:scale(1.04) translateY(-1px);
      box-shadow:0 0 40px rgba(59,130,246,.95);
      background:linear-gradient(135deg,#1d4ed8,#4338ca);
    }
    .btn:active{
      transform:scale(.97) translateY(1px);
      box-shadow:0 0 18px rgba(37,99,235,.7);
    }
    .pill-row{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:6px;
      font-size:10px;
      opacity:.85;
    }
    .pill{
      padding:3px 9px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.5);
      background:rgba(15,23,42,.9);
    }
    .hint{
      margin-top:14px;
      font-size:10px;
      opacity:.6;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="glow-ring"></div>
    <div class="tag">
      <span>WeAreNotDevs • Website Loader</span>
    </div>
    <h1>WeAreNotDevs!!</h1>
    <p class="subtitle">Pro WeAreDevs Loader</p>
    <p class="desc">
      Safe Loading For WeAreDevs Website
    </p>
    <button class="btn" id="downloadBtn">
      <span>↓ Go To WeAreDevs</span>
    </button>
    <div class="pill-row">
      <div class="pill">Fast Loading</div>
      <div class="pill">A Exploiters Dream</div>
      <div class="pill">Professional Made</div>
    </div>
    <p class="hint">If nothing happens, this website is probably down.</p>
  </section>

  <script>
    const DOWNLOAD_URL = "https://wearedevs.net/";

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = DOWNLOAD_URL;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  </script>
</body>
</html>
